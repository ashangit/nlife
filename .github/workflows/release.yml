name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.arch }}-cargo-release-

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libwayland-dev libxkbcommon-dev pkg-config

      - name: Build (release)
        run: cargo build --release

      - name: Rename binary
        run: cp target/release/newlife newlife-linux-${{ matrix.arch }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: newlife-linux-${{ matrix.arch }}
